<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Google</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="nav-links">
            <a href="image.html">Image Search</a>
            <a href="advanced.html">Advanced Search</a>
        </div>

        <div class="search-container">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo" class="google-logo">
            
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" class="search-bar" placeholder="Search Google">
                <div class="button-container">
                    <input type="submit" value="Google Search" class="search-button">
                    <input type="submit" name="btnI" value="I'm Feeling Lucky" class="lucky-button">
                </div>
            </form>
        </div>
    </body>

</html>
