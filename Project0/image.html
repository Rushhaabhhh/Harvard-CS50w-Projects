<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Google Image Search</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="nav-links">
            <a href="index.html">Google Search</a>
            <a href="advanced.html">Advanced Search</a>
        </div>

        <div class="search-container">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Images Logo" class="google-logo">
            
            <form action="https://www.google.com/images" method="GET">
                <input type="text" name="q" class="search-bar" placeholder="Search for images">
                <div class="button-container">
                    <input type="submit" value="Image Search" class="search-button">
                </div>
            </form>
        </div>
    </body>
    
</html>
